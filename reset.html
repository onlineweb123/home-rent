<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Rent PWA - Reset Password</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --background-color: #f8fafc;
            --card-color: #ffffff;
            --text-color: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #e11d48;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--background-color); color: var(--text-color); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .reset-container { width: 100%; max-width: 420px; background: var(--card-color); padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        
        .header-section { text-align: center; margin-bottom: 25px; }
        .header-section span.material-icons { font-size: 48px; color: var(--primary-color); background: #eff6ff; padding: 15px; border-radius: 50%; }
        .header-section h1 { font-size: 22px; font-weight: 700; margin-top: 15px; }
        .header-section p { font-size: 14px; color: var(--text-secondary); margin-top: 5px; line-height: 1.4; }
        
        .input-group { margin-bottom: 18px; position: relative; }
        .input-group span.material-icons { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 20px; }
        .input-group input { width: 100%; padding: 14px 14px 14px 45px; border: 1px solid #e2e8f0; background: #f8fafc; border-radius: 10px; outline: none; font-size: 14px; transition: 0.2s; color: var(--text-color); }
        .input-group input:focus { border-color: var(--primary-color); background: var(--card-color); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .btn-submit { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; position: relative; }
        .btn-submit:hover { background: #1d4ed8; }
        .btn-submit:disabled { background: #93c5fd; cursor: not-allowed; }
        
        .back-to-login { text-align: center; }
        .back-to-login a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
        .back-to-login a:hover { color: var(--primary-color); }

        /* லோடிங் ஸ்பின்னர் ஸ்டைல் */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="reset-container">
        <div class="header-section">
            <span class="material-icons">lock_reset</span>
            <h1>Reset Password</h1>
            <p id="instructionText">Enter your Name and registered Phone Number to verify your identity.</p>
        </div>

        <form id="verifyForm" onsubmit="handleVerify(event)">
            <div class="input-group">
                <span class="material-icons">person</span>
                <input type="text" id="verifyName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <span class="material-icons">call</span>
                <input type="tel" id="verifyPhone" placeholder="Phone Number" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number" required>
            </div>
            
            <button type="submit" class="btn-submit" id="verifyBtn">
                <span class="material-icons btn-icon">verified_user</span>
                <span class="btn-text">Verify Account</span>
                <div class="spinner"></div>
            </button>
        </form>

        <form id="newPasswordForm" style="display: none;" onsubmit="handleResetPassword(event)">
            <div class="input-group">
                <span class="material-icons">lock</span>
                <input type="password" id="newPassword" placeholder="Enter New Password" required>
            </div>
            
            <button type="submit" class="btn-submit" id="resetBtn">
                <span class="material-icons btn-icon">update</span>
                <span class="btn-text">Update Password</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div class="back-to-login">
            <a href="login.html">
                <span class="material-icons" style="font-size: 18px;">arrow_back</span> Back to Sign In
            </a>
        </div>
    </div>

    <script>
        // உங்கள் ஃபயர்பேஸ் டேட்டாபேஸ் URL 
        const usersDatabaseURL = "https://all-projects-2a14a-default-rtdb.firebaseio.com/users.json";
        
        let targetUserKey = null; // பாஸ்வேர்ட் மாற்ற வேண்டிய பயனரின் தனித்துவ ID-யை சேமிக்க

        // ஸ்பின்னர் லோடிங் அனிமேஷனுக்கான செயல்பாடு
        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const icon = btn.querySelector('.btn-icon');
            const text = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');

            if (isLoading) {
                btn.disabled = true;
                if(icon) icon.style.display = 'none';
                text.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                if(icon) icon.style.display = 'inline-block';
                text.style.display = 'inline-block';
                spinner.style.display = 'none';
            }
        }

        // 1. பெயர் மற்றும் ஃபோன் நம்பர் டேட்டாபேஸில் உள்ளதா என சரிபார்த்தல்
        async function handleVerify(event) {
            event.preventDefault();
            setLoading('verifyBtn', true);

            const inputName = document.getElementById('verifyName').value.trim().toLowerCase();
            const inputPhone = document.getElementById('verifyPhone').value.trim();

            try {
                const response = await fetch(usersDatabaseURL);
                const users = await response.json();

                if (users) {
                    // பெயர் மற்றும் ஃபோன் நம்பர் இரண்டும் ஒன்றாக மேட்ச் ஆகிறதா என தேடுகிறது
                    targetUserKey = Object.keys(users).find(key => 
                        users[key].phone === inputPhone && 
                        users[key].name.toLowerCase() === inputName
                    );
                }

                if (targetUserKey) {
                    alert("Account Verified Successfully! Now enter your new password.");
                    
                    // வெரிஃபிகேஷன் படிவத்தை மறைத்து, புதிய பாஸ்வேர்ட் படிவத்தைக் காட்டுகிறது
                    document.getElementById('verifyForm').style.display = 'none';
                    document.getElementById('newPasswordForm').style.display = 'block';
                    document.getElementById('instructionText').innerText = "Please choose a strong new password for your account.";
                } else {
                    alert("Account details not found! Please check your Name and Phone Number.");
                }
            } catch (error) {
                console.error("Verification error:", error);
                alert("Network error! Try again later.");
            } finally {
                setLoading('verifyBtn', false);
            }
        }

        // 2. சரிபார்க்கப்பட்ட பயனரின் பாஸ்வேர்டை டேட்டாபேஸில் மாற்றி அமைத்தல் (PATCH Method)
        async function handleResetPassword(event) {
            event.preventDefault();
            setLoading('resetBtn', true);

            const newPassword = document.getElementById('newPassword').value;
            // குறிப்பிட்ட பயனரின் விபரங்களை மட்டும் மாற்ற அதன் சரியான ஃபயர்பேஸ் URL
            const updateURL = `https://all-projects-2a14a-default-rtdb.firebaseio.com/users/${targetUserKey}.json`;

            try {
                const response = await fetch(updateURL, {
                    method: 'PATCH',
                    body: JSON.stringify({ password: newPassword }),
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    alert("Password Updated Successfully! Please login with your new password.");
                    window.location.href = 'login.html'; // வெற்றிகரமாக முடிந்ததும் லாகின் பக்கத்திற்கு ரீடைரக்ட் செய்யும்
                } else {
                    alert("Failed to update password. Try again.");
                }
            } catch (error) {
                console.error("Update error:", error);
                alert("Something went wrong while updating password.");
            } finally {
                setLoading('resetBtn', false);
            }
        }
    </script>
</body>
</html>

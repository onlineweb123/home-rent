<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Rent PWA - Authentication</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --background-color: #f8fafc;
            --card-color: #ffffff;
            --text-color: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #e11d48;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--background-color); color: var(--text-color); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .auth-container { width: 100%; max-width: 420px; background: var(--card-color); padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        
        .brand-logo { text-align: center; margin-bottom: 25px; }
        .brand-logo span.material-icons { font-size: 48px; color: var(--primary-color); }
        .brand-logo h1 { font-size: 24px; font-weight: 700; color: var(--text-color); margin-top: 5px; }
        
        /* Toggle Tabs */
        .tab-container { display: flex; background: #f1f5f9; padding: 5px; border-radius: 12px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; border: none; background: none; font-weight: 600; font-size: 14px; color: var(--text-secondary); cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { background: var(--card-color); color: var(--primary-color); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        
        /* Forms Styling */
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        
        .input-group { margin-bottom: 18px; position: relative; }
        .input-group span.material-icons { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 20px; }
        .input-group input { width: 100%; padding: 14px 14px 14px 45px; border: 1px solid #e2e8f0; background: #f8fafc; border-radius: 10px; outline: none; font-size: 14px; transition: 0.2s; color: var(--text-color); }
        .input-group input:focus { border-color: var(--primary-color); background: var(--card-color); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .forgot-link { text-align: right; margin-bottom: 20px; margin-top: -10px; }
        .forgot-link a { color: var(--primary-color); text-decoration: none; font-size: 13px; font-weight: 500; }
        .forgot-link a:hover { text-decoration: underline; }
        
        .btn-submit { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; }
        .btn-submit:hover { background: #1d4ed8; }
        .btn-submit:disabled { background: #93c5fd; cursor: not-allowed; }

        /* புதிய லோடிங் ஸ்பின்னர் ஸ்டைல் */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-logo">
            <span class="material-icons">home_work</span>
            <h1>Home Rent PWA</h1>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-form active" onsubmit="handleAuth(event, 'login')">
            <div class="input-group">
                <span class="material-icons">call</span>
                <input type="tel" id="loginPhone" placeholder="Phone Number" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number" required>
            </div>
            <div class="input-group">
                <span class="material-icons">lock</span>
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            <div class="forgot-link">
                <a href="reset.html">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-submit" id="loginBtn">
                <span class="material-icons btn-icon">login</span>
                <span class="btn-text">Sign In</span>
                <div class="spinner"></div>
            </button>
        </form>

        <form id="registerForm" class="auth-form" onsubmit="handleAuth(event, 'register')">
            <div class="input-group">
                <span class="material-icons">person</span>
                <input type="text" id="regName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <span class="material-icons">call</span>
                <input type="tel" id="regPhone" placeholder="Phone Number" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number" required>
            </div>
            <div class="input-group">
                <span class="material-icons">lock</span>
                <input type="password" id="regPassword" placeholder="Create Password" required>
            </div>
            <button type="submit" class="btn-submit" id="registerBtn">
                <span class="material-icons btn-icon">person_add</span>
                <span class="btn-text">Create Account</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>

    <script>
        const usersDatabaseURL = "https://all-projects-2a14a-default-rtdb.firebaseio.com/users.json";

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if(type === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        // லோடிங் நிலையை மாற்றுவதற்கான புதிய ஃபங்ஷன்
        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const icon = btn.querySelector('.btn-icon');
            const text = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');

            if (isLoading) {
                btn.disabled = true;
                if(icon) icon.style.display = 'none';
                text.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                if(icon) icon.style.display = 'inline-block';
                text.style.display = 'inline-block';
                spinner.style.display = 'none';
            }
        }

        async function handleAuth(event, type) {
            event.preventDefault();
            const currentBtnId = type === 'login' ? 'loginBtn' : 'registerBtn';
            
            // லோடிங் ஸ்பின்னரை ஆன் செய்கிறோம்
            setLoading(currentBtnId, true);

            if (type === 'login') {
                const phone = document.getElementById('loginPhone').value.trim();
                const password = document.getElementById('loginPassword').value;

                try {
                    const response = await fetch(usersDatabaseURL);
                    const users = await response.json();

                    let userFound = null;
                    if (users) {
                        userFound = Object.values(users).find(u => u.phone === phone && u.password === password);
                    }

                    if (userFound) {
                        alert("Login Successful! Welcome " + userFound.name);
                        localStorage.setItem('currentUser', JSON.stringify(userFound));
                        window.location.href = 'index.html'; 
                    } else {
                        alert("Invalid Phone Number or Password!");
                    }
                } catch (error) {
                    console.error("Error logging in:", error);
                    alert("Something went wrong. Please try again!");
                } finally {
                    // வேலை முடிந்ததும் ஸ்பின்னரை ஆஃப் செய்கிறோம்
                    setLoading(currentBtnId, false);
                }

            } else {
                const name = document.getElementById('regName').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const password = document.getElementById('regPassword').value;

                try {
                    const response = await fetch(usersDatabaseURL);
                    const users = await response.json();

                    if (users) {
                        const isPhoneExist = Object.values(users).some(u => u.phone === phone);
                        if (isPhoneExist) {
                            alert("This phone number is already registered! Please use another number or Sign In.");
                            setLoading(currentBtnId, false);
                            return;
                        }
                    }

                    const newUser = { name, phone, password };
                    const saveResponse = await fetch(usersDatabaseURL, {
                        method: 'POST',
                        body: JSON.stringify(newUser),
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (saveResponse.ok) {
                        alert("Account Created Successfully! Please Sign In.");
                        document.getElementById('registerForm').reset();
                        switchTab('login');
                    } else {
                        alert("Failed to create account. Try again.");
                    }
                } catch (error) {
                    console.error("Error creating account:", error);
                    alert("Network error! Unable to register.");
                } finally {
                    setLoading(currentBtnId, false);
                }
            }
        }
    </script>
</body>
</html>
